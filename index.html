<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WHO Global Health Observatory - Mubeen</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@300;400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --who-blue: #0065BD;
    --who-teal: #00A878;
    --who-red: #E63946;
    --who-amber: #F4A261;
    --bg: #04090F;
    --bg2: #0A1628;
    --bg3: #0F1F38;
    --border: rgba(0,101,189,0.25);
    --text: #E8F0FF;
    --muted: #6A85A8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,101,189,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,101,189,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }
  header {
    position: relative;
    z-index: 10;
    border-bottom: 1px solid var(--border);
    background: rgba(4,9,15,0.95);
    backdrop-filter: blur(10px);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
  }
  .logo-area { display: flex; align-items: center; gap: 1rem; }
  .who-emblem {
    width: 40px; height: 40px; border: 2px solid var(--who-blue); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Bebas Neue', sans-serif; font-size: 14px; color: var(--who-blue); letter-spacing: 1px;
  }
  .logo-text { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; letter-spacing: 3px; color: var(--text); }
  .logo-sub { font-family: 'IBM Plex Mono', monospace; font-size: 0.6rem; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }
  .header-meta { font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem; color: var(--muted); text-align: right; letter-spacing: 1px; }
  .live-dot { display: inline-block; width: 6px; height: 6px; background: var(--who-teal); border-radius: 50%; margin-right: 6px; animation: pulse 2s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.8); } }
  .hero { position: relative; z-index: 1; padding: 3rem 2rem 2rem; border-bottom: 1px solid var(--border); overflow: hidden; }
  .hero::after { content: 'GHO'; position: absolute; right: -20px; top: -40px; font-family: 'Bebas Neue', sans-serif; font-size: 18rem; color: rgba(0,101,189,0.04); pointer-events: none; line-height: 1; }
  .hero-tag { font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem; letter-spacing: 3px; color: var(--who-blue); text-transform: uppercase; margin-bottom: 0.75rem; }
  .hero-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(2.5rem, 6vw, 5rem); line-height: 1; letter-spacing: 4px; margin-bottom: 0.75rem; }
  .hero-title span { color: var(--who-blue); }
  .hero-desc { font-size: 0.9rem; color: var(--muted); max-width: 600px; line-height: 1.6; font-weight: 300; }
  .stats-strip { position: relative; z-index: 1; display: grid; grid-template-columns: repeat(4, 1fr); border-bottom: 1px solid var(--border); }
  .stat-cell { padding: 1.5rem 2rem; border-right: 1px solid var(--border); position: relative; overflow: hidden; cursor: default; transition: background 0.3s; }
  .stat-cell:last-child { border-right: none; }
  .stat-cell:hover { background: rgba(0,101,189,0.05); }

  .stat-cell:hover::before { transform: scaleX(1); }
